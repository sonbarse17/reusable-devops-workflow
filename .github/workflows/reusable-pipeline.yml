name: Reusable DevOps Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
        default: 'dev'
  workflow_call:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        type: string
      image_name:
        description: 'Docker image name'
        required: true
        type: string
      registry:
        description: 'Docker registry'
        required: false
        type: string
        default: 'docker.io'
      k8s_cluster:
        description: 'Kubernetes Cluster Name'
        required: true
        type: string
      k8s_namespace:
        description: 'Kubernetes Namespace'
        required: true
        type: string
      k8s_server:
        description: 'Kubernetes API Server URL'
        required: true
        type: string
      deploy_method:
        description: 'Deployment method (kubectl or helm)'
        required: false
        type: string
        default: 'kubectl'
      helm_chart_path:
        description: 'Path to Helm chart'
        required: false
        type: string
        default: './charts'
      helm_release_name:
        description: 'Helm release name'
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      KUBE_CONFIG_DATA:
        description: 'Base64 encoded kubeconfig'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Branch and Environment Mapping
        run: |
          BRANCH="${{ github.ref_name }}"
          ENV="${{ inputs.environment }}"
          
          if [[ "$ENV" == "prod" && "$BRANCH" != "release" ]]; then
            echo "Error: 'prod' environment requires 'release' branch." && exit 1
          elif [[ "$ENV" == "uat" && "$BRANCH" != "main" ]]; then
            echo "Error: 'uat' environment requires 'main' branch." && exit 1
          elif [[ "$ENV" == "dev" && "$BRANCH" != feature* && "$BRANCH" != "feature" ]]; then
            echo "Error: 'dev' environment requires 'feature' branch." && exit 1
          fi

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Prepare Docker Metadata
        id: meta
        run: |
          # Ensure all inputs are lowercase for Docker registry requirements
          REGISTRY=$(echo "${{ inputs.registry }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=$(echo "${{ inputs.image_name }}" | tr '[:upper:]' '[:lower:]')
          
          # Construct final image path
          FULL_IMAGE_PATH="$REGISTRY/$IMAGE_NAME"
          
          echo "tag_sha=$FULL_IMAGE_PATH:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "tag_env=$FULL_IMAGE_PATH:${{ inputs.environment }}" >> $GITHUB_OUTPUT
          
          echo "Build Target: $FULL_IMAGE_PATH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install --upgrade pip
            pip install -r requirements.txt
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag_sha }}
            ${{ steps.meta.outputs.tag_env }}

  deploy:
    name: K8s Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}
          context: ${{ inputs.k8s_cluster }}

      - name: Install Helm
        if: inputs.deploy_method == 'helm'
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Deploy to Cluster (Kubectl)
        if: inputs.deploy_method == 'kubectl'
        run: |
          kubectl set image deployment/${{ inputs.image_name }} \
            ${{ inputs.image_name }}=${{ inputs.registry }}/${{ inputs.image_name }}:${{ github.sha }} \
            -n ${{ inputs.k8s_namespace }}
          kubectl rollout status deployment/${{ inputs.image_name }} -n ${{ inputs.k8s_namespace }}

      - name: Deploy to Cluster (Helm)
        if: inputs.deploy_method == 'helm'
        run: |
          RELEASE_NAME="${{ inputs.helm_release_name || inputs.image_name }}"
          helm upgrade --install $RELEASE_NAME ${{ inputs.helm_chart_path }} \
            --namespace ${{ inputs.k8s_namespace }} \
            --create-namespace \
            --set image.repository=${{ inputs.registry }}/${{ inputs.image_name }} \
            --set image.tag=${{ github.sha }} \
            --wait
